server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tourism_db?useUnicode=true&characterEncoding=UTF-8&characterSetResults=UTF-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.tourism.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: tourism_admin_jwt_secret_key_2024
  expire: 86400000

# 文件上传配置
upload:
  path: ./uploads
  url: http://localhost:8080/uploads

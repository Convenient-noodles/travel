server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:tourism_db}?useUnicode=true&characterEncoding=UTF-8&characterSetResults=UTF-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.tourism.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT配置
jwt:
  secret: ${JWT_SECRET:tourism_admin_jwt_secret_key_2024}
  expire: ${JWT_EXPIRE:86400000}

# 文件上传配置
upload:
  path: ${UPLOAD_PATH:./uploads}
  url: ${UPLOAD_URL:http://localhost:8080/uploads}

# 微信小程序配置
wx:
  app-id: ${WX_APP_ID:wx192b49035cdcc74b}
  app-secret: ${WX_APP_SECRET:dev-wx-secret-placeholder}
